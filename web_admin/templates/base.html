<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crypto Bot Admin{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: #1a2332;
            padding: 20px 0;
            border-bottom: 1px solid #2a3441;
            margin-bottom: 30px;
        }
        
        header h1 {
            color: #4fc3f7;
            font-size: 24px;
        }
        
        nav {
            margin-top: 15px;
        }
        
        nav a {
            color: #90a4ae;
            text-decoration: none;
            margin-right: 20px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        nav a:hover {
            color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }
        
        .flash-messages {
            margin-bottom: 20px;
        }
        
        .flash {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        
        .flash.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #81c784;
        }
        
        .flash.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #e57373;
        }
        
        .card {
            background: #1a2332;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a3441;
        }
        
        .card h2 {
            color: #4fc3f7;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1a2332;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a3441;
        }
        
        .stat-card h3 {
            color: #90a4ae;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
        }
        
        .stat-card.total .number { color: #4fc3f7; }
        .stat-card.active .number { color: #81c784; }
        .stat-card.expiring .number { color: #ffb74d; }
        .stat-card.expired .number { color: #e57373; }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a3441;
        }
        
        th {
            color: #90a4ae;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 12px;
        }
        
        tr:hover {
            background: rgba(79, 195, 247, 0.05);
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status.active {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }
        
        .status.expiring {
            background: rgba(255, 152, 0, 0.2);
            color: #ffb74d;
        }
        
        .status.expired {
            background: rgba(244, 67, 54, 0.2);
            color: #e57373;
        }
        
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #4fc3f7;
            color: #0f1419;
        }
        
        .btn-primary:hover {
            background: #29b6f6;
        }
        
        .btn-danger {
            background: #f44336;
            color: white;
        }
        
        .btn-danger:hover {
            background: #d32f2f;
        }
        
        .btn-small {
            padding: 4px 12px;
            font-size: 12px;
        }
        
        form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            color: #90a4ae;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        input, select {
            background: #0f1419;
            border: 1px solid #2a3441;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .login-form input {
            width: 100%;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        .days-left {
            font-weight: 500;
        }
        
        .days-left.positive { color: #81c784; }
        .days-left.warning { color: #ffb74d; }
        .days-left.negative { color: #e57373; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
