# Render Deployment Configuration
# This file configures the Crypto Signal Bot for deployment on Render

services:
  # Web service (runs bot + web admin panel)
  - type: web
    name: crypto-signal-bot
    runtime: python
    pythonVersion: 3.11.0
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_SECRET
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_PAYMENT_LINK
        sync: false
      - key: CRYPTO_WALLET_USDT
        sync: false
      - key: CRYPTO_NETWORK
        value: TRC20
      - key: SUPPORT_USERNAME
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_SECRET_KEY
        generateValue: true
    
    # Health check
    healthCheckPath: /
    
    # Auto-deploy on git push
    autoDeploy: true
